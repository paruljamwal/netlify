<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Binaire">
  <defs>
    <radialGradient id="cosmos" cx="50%" cy="38%" r="68%">
      <stop offset="0%" stop-color="#1a1530"/>
      <stop offset="55%" stop-color="#12121a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <linearGradient id="soma" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff3b0"/>
      <stop offset="45%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#9a7209"/>
    </linearGradient>
    <linearGradient id="agni" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff3b47"/>
      <stop offset="100%" stop-color="#c40812"/>
    </linearGradient>
  </defs>

  <!-- Mandala field -->
  <rect width="32" height="32" rx="8" fill="url(#cosmos)"/>

  <!-- Ashtakona — eight auspicious rays (prosperity geometry) -->
  <g fill="none" stroke="url(#soma)" stroke-width="0.65" opacity="0.85">
    <path d="M16 4.5v4M16 23.5v4M4.5 16h4M23.5 16h4"/>
    <path d="M7.8 7.8l2.8 2.8M21.4 21.4l2.8 2.8M24.2 7.8l-2.8 2.8M10.6 21.4l-2.8 2.8"/>
  </g>

  <!-- Lotus ring — twelve petals, subtle -->
  <circle cx="16" cy="16" r="10.2" fill="none" stroke="url(#soma)" stroke-width="0.45" opacity="0.35"/>
  <circle cx="16" cy="16" r="7.8" fill="none" stroke="#4a3f7a" stroke-width="0.35" opacity="0.5"/>

  <!-- Bindu — focal point above (guru drishti) -->
  <circle cx="16" cy="6.2" r="1.05" fill="url(#soma)"/>

  <!-- Play — agni triangle, action -->
  <path
    d="M12.4 10.2a0.95 0.95 0 0 0-0.95 0.95v9.7a0.95 0.95 0 0 0 1.46 0.81l7.9-4.85a0.95 0.95 0 0 0 0-1.62l-7.9-4.85a0.95 0.95 0 0 0-0.51-0.16Z"
    fill="url(#agni)"
  />

  <!-- Shukra bindu — golden seed, bottom -->
  <circle cx="16" cy="25.6" r="0.85" fill="url(#soma)" opacity="0.75"/>
</svg>
